<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeighTruck | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script>
        if ((localStorage.getItem('weightruck_theme') || localStorage.getItem('wieghtruck_theme')) === 'light') {
            document.body.classList.add('light-theme');
        }
    </script>
    
    <div class="theme-toggle floating-theme-toggle" id="theme-toggle-btn" title="Toggle Light/Dark Theme">
        <i class="fa-solid fa-moon"></i>
    </div>

    <div class="login-page">
        <div class="auth-card">
            <div class="auth-brand">
                <img src="app/logo/fa42db3f-3201-4345-a8d6-604093f66a2e.png" alt="WeighTruck Logo">
                <div>
                    <h1>WeighTruck</h1>
                    <p>Supply chain intelligence for mine logistics.</p>
                </div>
            </div>
            <h2>Welcome back</h2>
            <p>Sign in to continue to your WeighTruck dashboard and manage orders, vehicles, and weighbridge workflows.</p>

            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input id="login-username" type="text" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input id="login-password" type="password" placeholder="Enter your password" required>
                </div>
                <div id="login-error" class="auth-error" style="display:none;"></div>

                <div class="auth-actions">
                    <button type="submit" class="btn-primary"><i class="fa-solid fa-right-to-bracket"></i> Sign In</button>
                    <a href="register.html" class="btn-text auth-link">Create an account</a>
                </div>
            </form>

            <div class="auth-footer">
                Demo credentials: <strong>demo</strong> / <strong>weightruck</strong>.<br>
                Or use any credentials to navigate to the dashboard in demo mode.
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const loginError = document.getElementById('login-error');

        loginForm.addEventListener('submit', (event) => {
            event.preventDefault();
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value.trim();

            if (!username || !password) {
                loginError.textContent = 'Please enter both username and password.';
                loginError.style.display = 'block';
                return;
            }

            if (username.toLowerCase() === 'demo' && (password.toLowerCase() === 'weightruck' || password.toLowerCase() === 'wieghtruck')) {
                window.location.href = 'index.html';
                return;
            }

            window.location.href = 'index.html';
        });

        // Theme Toggle Logic
        const themeBtn = document.getElementById('theme-toggle-btn');
        function updateThemeIcon() {
            const icon = themeBtn.querySelector('i');
            if (document.body.classList.contains('light-theme')) {
                icon.className = 'fa-solid fa-sun';
            } else {
                icon.className = 'fa-solid fa-moon';
            }
        }
        updateThemeIcon();
        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('light-theme');
            const isLight = document.body.classList.contains('light-theme');
            localStorage.setItem('weightruck_theme', isLight ? 'light' : 'dark');
            updateThemeIcon();
        });
    </script>
</body>
</html>
